<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Gridsmith</title>
    <style>
        :root {
            --bg: #f8f8fc;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b6b80;
            --accent: #5851e0;
            --border: #e8e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0e0e1a;
                --surface: #1a1a2e;
                --text: #eeeef4;
                --text-secondary: #9898ab;
                --accent: #8080f0;
                --border: #2a2a40;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            text-align: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 16px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .email {
            display: inline-block;
            margin: 6px 0 18px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(88, 81, 224, 0.10);
        }
        .meta {
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/gridsmith-pages/">Gridsmith</a>
        <a href="/gridsmith-pages/privacy/">Privacy</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Support</h1>
            <p>For app issues, purchase restore help, or general feedback about Gridsmith, contact:</p>
            <p><a class="email" href="mailto:support@springdata.uk">support@springdata.uk</a></p>
            <p class="meta">Gridsmith is developed and published by Spring Data Limited.</p>
            <p class="meta">For privacy information, see the <a href="/gridsmith-pages/privacy/">Privacy Policy</a>.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Spring Data Limited. All rights reserved.</p>
    </footer>
</body>
</html>
